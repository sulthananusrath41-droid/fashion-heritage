{% extends "fashion_heritage/layout.html" %}

{% block body %}
    
      <h1>Search results for: "{{ query }}"</h1>
      <ul>
      {% for gown in gowns %}
           <li>
             <a href="/gown/{{ gown.id }}">{{ gown.name }}</a>
             <p>Country: {{ gown.country_of_origin }}</p>
           </li>
    {% endfor %}
       </ul>
{% endblock %}
